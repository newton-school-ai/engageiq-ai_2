services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: engageiq_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - .:/app
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload

  # TODO: Enable after frontend scaffold is added.
  # frontend:
  #   build: ./frontend
  #   ports:
  #     - "5173:5173"
